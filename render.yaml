
services:
  - type: web
    name: smartoutfit-advisor
    env: python
    buildCommand: npm install && npm run build && pip install -r requirements.txt
    startCommand: uvicorn merged_main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PORT
        value: "10000"
      - key: PYTHONUNBUFFERED
        value: "1"
    plan: starter
    healthCheckPath: /api/health
    autoDeploy: true

